<div class="container">
  <h2 class="text-success mb-4">Explore Destinations</h2>

  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <input type="text" class="form-control" placeholder="Search by name..." 
             [(ngModel)]="searchTerm" (input)="filterData()">
    </div>
    <div class="col-md-4">
      <select class="form-select" [(ngModel)]="selectedDistrict" (change)="filterData()">
        <option value="">All Districts</option>
        <option value="Idukki">Idukki</option>
        <option value="Alappuzha">Alappuzha</option>
        <option value="Ernakulam">Ernakulam</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let item of filteredDestinations">
      <div class="card h-100 shadow-sm border-0">
        <img [src]="item.imageUrl" class="card-img-top" [alt]="item.name" style="height: 200px; object-fit: cover;">
        <div class="card-body">
          <span class="badge bg-success mb-2">{{item.category}}</span>
          <h5 class="card-title">{{item.name}}</h5>
          <p class="text-muted"><i class="bi bi-geo-alt"></i> {{item.district}}</p>
          <p class="card-text">{{item.description}}</p>
          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold">Entry: ₹{{item.entryFee}}</span>
            <button class="btn btn-outline-success btn-sm">Details</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
